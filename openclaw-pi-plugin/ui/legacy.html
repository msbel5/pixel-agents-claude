<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Agents - Alcyone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: monospace;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}
canvas { display: block; image-rendering: pixelated; }
#status {
  position: fixed;
  top: 8px;
  right: 12px;
  font-size: 12px;
  color: #666;
  z-index: 10;
}
#title {
  position: fixed;
  top: 8px;
  left: 12px;
  font-size: 14px;
  color: #7ec8e3;
  z-index: 10;
  text-shadow: 0 0 6px rgba(126,200,227,0.4);
}
</style>
</head>
<body>
<div id="title">&#x2605; Alcyone Pixel Agents</div>
<div id="status">connecting...</div>
<canvas id="c"></canvas>

<script>
// Legacy Pixel Agents Dashboard — works on Chrome 67+ (no ES modules)
// Polls /pixel-agents/api/snapshot every 2s, renders pixel office on Canvas

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var statusEl = document.getElementById('status');

// -- Config --
var TILE = 16;
var AGENT_SIZE = 14;
var OFFICE_W = 20;
var OFFICE_H = 14;
var FPS = 8;
var POLL_MS = 2000;

// -- Colors --
var COLORS = {
  bg: '#1a1a2e',
  floor: '#2d2d44',
  floorAlt: '#33334d',
  wall: '#0f3460',
  wallTop: '#16213e',
  desk: '#8b6914',
  deskTop: '#a67c00',
  monitor: '#222',
  monitorOn: '#00ff88',
  monitorOff: '#333',
  chair: '#553311',
  plant: '#1a6b1a',
  plantPot: '#8b4513',
  rug: '#2a1a4a',
  bookshelf: '#5c3a1e',
  book1: '#c0392b',
  book2: '#2980b9',
  book3: '#27ae60',
  coffee: '#6f4e37',
  sofa: '#8e3557',
  table: '#b8860b',
  clock: '#ddd',
};

// Agent state colors
var STATE_COLORS = {
  active: '#00ff88',
  typing: '#ffaa00',
  reading: '#5599ff',
  thinking: '#ff55ff',
  running: '#ff4444',
  waiting: '#888888',
  idle: '#555555',
  done: '#00cc66',
};

// Agent body colors
var AGENT_BODY = [
  '#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6',
  '#1abc9c', '#e67e22', '#00bcd4',
];

// -- Office Layout (static furniture) --
var furniture = [];
var walls = [];

function buildOffice() {
  // Walls
  for (var x = 0; x < OFFICE_W; x++) {
    walls.push({x: x, y: 0});
    walls.push({x: x, y: OFFICE_H - 1});
  }
  for (var y = 0; y < OFFICE_H; y++) {
    walls.push({x: 0, y: y});
    walls.push({x: OFFICE_W - 1, y: y});
  }
  // Interior wall (divider)
  for (var y2 = 0; y2 < 8; y2++) {
    walls.push({x: 10, y: y2});
  }

  // Left room: desks + computers
  furniture.push({type:'desk', x:3, y:3, w:3, h:1});
  furniture.push({type:'monitor', x:3, y:2, on:false});
  furniture.push({type:'monitor', x:5, y:2, on:false});
  furniture.push({type:'desk', x:3, y:6, w:3, h:1});
  furniture.push({type:'monitor', x:3, y:5, on:false});
  furniture.push({type:'monitor', x:5, y:5, on:false});
  furniture.push({type:'chair', x:3, y:4});
  furniture.push({type:'chair', x:5, y:4});
  furniture.push({type:'chair', x:3, y:7});
  furniture.push({type:'chair', x:5, y:7});

  // Bookshelf
  furniture.push({type:'bookshelf', x:1, y:1, w:3});
  furniture.push({type:'bookshelf', x:6, y:1, w:3});

  // Plants
  furniture.push({type:'plant', x:1, y:4});
  furniture.push({type:'plant', x:8, y:4});
  furniture.push({type:'plant', x:1, y:10});

  // Right room: lounge
  furniture.push({type:'sofa', x:13, y:3, w:3, h:1});
  furniture.push({type:'sofa', x:13, y:7, w:3, h:1});
  furniture.push({type:'table', x:14, y:5, w:1, h:1});
  furniture.push({type:'rug', x:12, y:2, w:5, h:7});

  // Clock
  furniture.push({type:'clock', x:4, y:1});

  // Coffee machine
  furniture.push({type:'coffee', x:8, y:10});
}

// -- Agents State --
var agents = [];
var lastSnapshot = null;

// Desk positions for agents
var deskPositions = [
  {x: 3, y: 4}, {x: 5, y: 4},
  {x: 3, y: 7}, {x: 5, y: 7},
  {x: 14, y: 4}, {x: 14, y: 6},
];

function mapAgentsFromSnapshot(data) {
  if (!data || !data.agents) return;

  var newAgents = [];
  var agentList = data.agents;
  if (!Array.isArray(agentList)) {
    // Convert object to array
    agentList = [];
    for (var k in data.agents) {
      if (data.agents.hasOwnProperty(k)) {
        var a = data.agents[k];
        a.id = a.id || k;
        agentList.push(a);
      }
    }
  }

  for (var i = 0; i < agentList.length; i++) {
    var agent = agentList[i];
    var pos = deskPositions[i % deskPositions.length];
    var state = agent.state || agent.status || 'idle';

    // Normalize state
    if (state === 'tool_running' || state === 'tool_call') state = 'running';
    else if (state === 'llm_thinking' || state === 'generating') state = 'thinking';
    else if (state === 'llm_streaming' || state === 'typing') state = 'typing';
    else if (state === 'reading_file' || state === 'reading') state = 'reading';
    else if (state === 'waiting_permission' || state === 'waiting') state = 'waiting';

    var existing = null;
    for (var j = 0; j < agents.length; j++) {
      if (agents[j].id === (agent.id || 'agent_' + i)) {
        existing = agents[j];
        break;
      }
    }

    newAgents.push({
      id: agent.id || 'agent_' + i,
      name: agent.name || agent.id || 'Agent ' + (i + 1),
      state: state,
      color: AGENT_BODY[i % AGENT_BODY.length],
      x: existing ? existing.x : pos.x,
      y: existing ? existing.y : pos.y,
      targetX: pos.x,
      targetY: pos.y,
      frame: existing ? existing.frame : 0,
      bobOffset: existing ? existing.bobOffset : Math.random() * Math.PI * 2,
      tool: agent.currentTool || agent.tool || null,
    });
  }
  agents = newAgents;

  // Update monitors
  for (var m = 0; m < furniture.length; m++) {
    if (furniture[m].type === 'monitor') {
      furniture[m].on = false;
    }
  }
  // Light up monitors for active agents at desks
  for (var a2 = 0; a2 < agents.length; a2++) {
    if (agents[a2].state !== 'idle' && agents[a2].state !== 'waiting') {
      var ax = agents[a2].targetX;
      var ay = agents[a2].targetY;
      for (var m2 = 0; m2 < furniture.length; m2++) {
        if (furniture[m2].type === 'monitor') {
          var dx = Math.abs(furniture[m2].x - ax);
          var dy = Math.abs(furniture[m2].y - (ay - 2));
          if (dx <= 1 && dy <= 1) {
            furniture[m2].on = true;
          }
        }
      }
    }
  }
}

// If no agents from API, show demo
function ensureDemoAgents() {
  if (agents.length > 0) return;
  var demoNames = ['Captain', 'Builder', 'Inspector', 'Liaison', 'Archivist'];
  var demoStates = ['thinking', 'typing', 'reading', 'idle', 'waiting'];
  for (var i = 0; i < 5; i++) {
    var pos = deskPositions[i % deskPositions.length];
    agents.push({
      id: 'demo_' + i,
      name: demoNames[i],
      state: demoStates[i],
      color: AGENT_BODY[i],
      x: pos.x, y: pos.y,
      targetX: pos.x, targetY: pos.y,
      frame: 0,
      bobOffset: i * 1.2,
      tool: null,
    });
  }
}

// -- Polling --
var pollTimer = null;
function poll() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/pixel-agents/api/snapshot', true);
  xhr.timeout = 5000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          lastSnapshot = data;
          mapAgentsFromSnapshot(data);
          statusEl.textContent = 'live \u2022 ' + agents.length + ' agents';
          statusEl.style.color = '#00ff88';
        } catch(e) {
          statusEl.textContent = 'parse error';
          statusEl.style.color = '#ff4444';
        }
      } else {
        statusEl.textContent = 'offline (' + xhr.status + ')';
        statusEl.style.color = '#ff4444';
        ensureDemoAgents();
      }
      pollTimer = setTimeout(poll, POLL_MS);
    }
  };
  xhr.onerror = function() {
    statusEl.textContent = 'no connection';
    statusEl.style.color = '#ff4444';
    ensureDemoAgents();
    pollTimer = setTimeout(poll, POLL_MS);
  };
  xhr.send();
}

// -- Rendering --
var frameCount = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // Calculate tile size to fit
  var tw = Math.floor(canvas.width / OFFICE_W);
  var th = Math.floor(canvas.height / OFFICE_H);
  TILE = Math.max(8, Math.min(tw, th));
}

function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * TILE, y * TILE, w * TILE, h * TILE);
}

function drawFloor() {
  for (var y = 0; y < OFFICE_H; y++) {
    for (var x = 0; x < OFFICE_W; x++) {
      var isAlt = (x + y) % 2 === 0;
      drawPixelRect(x, y, 1, 1, isAlt ? COLORS.floor : COLORS.floorAlt);
    }
  }
}

function drawWalls() {
  for (var i = 0; i < walls.length; i++) {
    var w = walls[i];
    drawPixelRect(w.x, w.y, 1, 1, COLORS.wall);
    // Top edge highlight
    ctx.fillStyle = COLORS.wallTop;
    ctx.fillRect(w.x * TILE, w.y * TILE, TILE, 3);
  }
}

function drawFurniture() {
  for (var i = 0; i < furniture.length; i++) {
    var f = furniture[i];
    var px = f.x * TILE;
    var py = f.y * TILE;

    switch(f.type) {
      case 'desk':
        ctx.fillStyle = COLORS.desk;
        ctx.fillRect(px, py, (f.w || 1) * TILE, (f.h || 1) * TILE);
        ctx.fillStyle = COLORS.deskTop;
        ctx.fillRect(px, py, (f.w || 1) * TILE, 3);
        break;
      case 'monitor':
        ctx.fillStyle = COLORS.monitor;
        ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 6);
        ctx.fillStyle = f.on ? COLORS.monitorOn : COLORS.monitorOff;
        ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 10);
        if (f.on && frameCount % 4 < 2) {
          ctx.fillStyle = 'rgba(0,255,136,0.15)';
          ctx.fillRect(px + 4, py + 4, TILE - 8, TILE - 10);
        }
        break;
      case 'chair':
        ctx.fillStyle = COLORS.chair;
        ctx.fillRect(px + 3, py + 3, TILE - 6, TILE - 6);
        break;
      case 'plant':
        ctx.fillStyle = COLORS.plantPot;
        ctx.fillRect(px + 4, py + TILE - 6, TILE - 8, 6);
        ctx.fillStyle = COLORS.plant;
        var leafY = py + 2 + Math.sin(frameCount * 0.1 + f.x) * 1;
        ctx.fillRect(px + 2, leafY, TILE - 4, TILE - 8);
        break;
      case 'bookshelf':
        ctx.fillStyle = COLORS.bookshelf;
        ctx.fillRect(px, py, (f.w || 1) * TILE, TILE);
        for (var b = 0; b < (f.w || 1) * 3; b++) {
          var bookColors = [COLORS.book1, COLORS.book2, COLORS.book3];
          ctx.fillStyle = bookColors[b % 3];
          ctx.fillRect(px + 3 + b * 5, py + 3, 3, TILE - 6);
        }
        break;
      case 'sofa':
        ctx.fillStyle = COLORS.sofa;
        ctx.fillRect(px, py, (f.w || 1) * TILE, (f.h || 1) * TILE);
        ctx.fillStyle = '#a04070';
        ctx.fillRect(px + 2, py + 2, (f.w || 1) * TILE - 4, 4);
        break;
      case 'table':
        ctx.fillStyle = COLORS.table;
        ctx.fillRect(px, py, (f.w || 1) * TILE, (f.h || 1) * TILE);
        break;
      case 'rug':
        ctx.fillStyle = COLORS.rug;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(px, py, (f.w || 1) * TILE, (f.h || 1) * TILE);
        ctx.globalAlpha = 1.0;
        break;
      case 'clock':
        ctx.fillStyle = COLORS.clock;
        ctx.beginPath();
        ctx.arc(px + TILE/2, py + TILE/2, TILE/3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px + TILE/2, py + TILE/2);
        var angle = (frameCount * 0.02) % (Math.PI * 2);
        ctx.lineTo(px + TILE/2 + Math.cos(angle) * TILE/4, py + TILE/2 + Math.sin(angle) * TILE/4);
        ctx.stroke();
        break;
      case 'coffee':
        ctx.fillStyle = COLORS.coffee;
        ctx.fillRect(px + 2, py + 4, TILE - 4, TILE - 4);
        // Steam
        if (frameCount % 6 < 3) {
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fillRect(px + 6, py - 2, 2, 4);
          ctx.fillRect(px + 10, py - 4, 2, 4);
        }
        break;
    }
  }
}

function drawAgent(agent) {
  var px = agent.x * TILE;
  var py = agent.y * TILE;
  var bob = Math.sin(frameCount * 0.15 + agent.bobOffset) * 2;
  var stateColor = STATE_COLORS[agent.state] || STATE_COLORS.idle;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 2, py + TILE - 3, TILE - 4, 3);

  // Body
  ctx.fillStyle = agent.color;
  ctx.fillRect(px + 3, py + 4 + bob, TILE - 6, TILE - 8);

  // Head
  ctx.fillStyle = '#ffd5a0';
  ctx.fillRect(px + 5, py + bob, TILE - 10, 6);

  // State indicator (glow dot above head)
  ctx.fillStyle = stateColor;
  ctx.beginPath();
  ctx.arc(px + TILE/2, py - 3 + bob, 3, 0, Math.PI * 2);
  ctx.fill();

  // Pulse for active states
  if (agent.state === 'typing' || agent.state === 'running' || agent.state === 'thinking') {
    var pulse = Math.sin(frameCount * 0.3 + agent.bobOffset) * 0.5 + 0.5;
    ctx.fillStyle = stateColor;
    ctx.globalAlpha = pulse * 0.3;
    ctx.beginPath();
    ctx.arc(px + TILE/2, py - 3 + bob, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
  }

  // Name tag
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(agent.name, px + TILE/2, py + TILE + 8);

  // State text
  ctx.fillStyle = stateColor;
  ctx.font = '7px monospace';
  ctx.fillText(agent.state, px + TILE/2, py + TILE + 16);

  // Tool name if running
  if (agent.tool && (agent.state === 'running' || agent.state === 'typing')) {
    ctx.fillStyle = '#ffaa00';
    ctx.font = '6px monospace';
    ctx.fillText(agent.tool, px + TILE/2, py + TILE + 23);
  }
}

function drawAgents() {
  for (var i = 0; i < agents.length; i++) {
    // Smooth movement
    var a = agents[i];
    a.x += (a.targetX - a.x) * 0.1;
    a.y += (a.targetY - a.y) * 0.1;
    drawAgent(a);
  }
}

function drawHUD() {
  // Bottom bar with agent summary
  var barH = 28;
  var barY = canvas.height - barH;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, barY, canvas.width, barH);

  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  var xOff = 12;
  for (var i = 0; i < agents.length; i++) {
    var a = agents[i];
    var sc = STATE_COLORS[a.state] || '#888';
    // Dot
    ctx.fillStyle = sc;
    ctx.beginPath();
    ctx.arc(xOff, barY + 14, 4, 0, Math.PI * 2);
    ctx.fill();
    // Name
    ctx.fillStyle = '#ccc';
    ctx.fillText(a.name, xOff + 8, barY + 18);
    xOff += ctx.measureText(a.name).width + 24;
  }

  // Time
  var now = new Date();
  var timeStr = ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#7ec8e3';
  ctx.font = '12px monospace';
  ctx.fillText(timeStr, canvas.width - 12, barY + 18);
}

function render() {
  frameCount++;
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Center office
  var offX = Math.floor((canvas.width - OFFICE_W * TILE) / 2);
  var offY = Math.floor((canvas.height - OFFICE_H * TILE) / 2);
  ctx.save();
  ctx.translate(offX, offY);

  drawFloor();
  drawWalls();
  drawFurniture();
  drawAgents();

  ctx.restore();
  drawHUD();

  requestAnimationFrame(render);
}

// -- Init --
window.onresize = resize;
resize();
buildOffice();
ensureDemoAgents();
poll();
render();
</script>
</body>
</html>
